# AI Feature Research Workflow
# Automatically researches the web for new features and creates issues
# Uses opencode + MiniMax M2.5 Free

name: AI Feature Research

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic to research"
        required: false
        default: "operating system kernel features"

permissions:
  contents: write
  issues: write

env:
  AI_MODEL: "minimax-m2.5-free"
  AI_TOOL: "opencode"

jobs:
  ai-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup opencode
        run: |
          curl -sSL https://opencode.ai/install.sh | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Research New Features
        id: research
        run: |
          TOPIC="${{ github.event.inputs.topic || 'operating system kernel features' }}"

          RESEARCH_OUTPUT=$(opencode run \
            --model $AI_MODEL \
            --system-prompt "You are an OS research assistant. Research the latest kernel developments and output JSON." \
            "Research the latest developments in operating system kernel design,
            with focus on: $TOPIC

            Research topics:
            - New x86_64 features and CPU capabilities
            - Memory management innovations
            - Filesystem advances (e.g., F2FS, Btrfs improvements)
            - Network stack optimizations (eBPF, XDP, etc.)
            - Security enhancements (CFI, shadow stack, PKU, etc.)
            - Virtualization improvements
            - AI-assisted OS research

            Output ONLY a valid JSON array (no markdown, no explanation) with this exact structure:
            [
              {
                \"name\": \"Feature name\",
                \"description\": \"Brief description\",
                \"relevance\": \"Why relevant for AIOS\",
                \"complexity\": \"Low/Medium/High\",
                \"priority\": 8,
                \"ai_prompt\": \"Prompt to generate initial implementation\",
                \"references\": \"Links to papers/RFCs/implementations\"
              }
            ]

            Include at least 3 high-priority features (priority >= 7).") 2>&1

          echo "research_output=$RESEARCH_OUTPUT" >> $GITHUB_OUTPUT

          # Save to file for next step
          echo "$RESEARCH_OUTPUT" > research_results.json
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Create Feature Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let researchOutput = '';
            try {
              researchOutput = fs.readFileSync('research_results.json', 'utf8');
            } catch (e) {
              researchOutput = process.env.RESEARCH_OUTPUT || '[]';
            }

            let features;
            try {
              // Try to extract JSON from the output
              const jsonMatch = researchOutput.match(/\[[\s\S]*\]/);
              features = jsonMatch ? JSON.parse(jsonMatch[0]) : [];
            } catch (e) {
              console.log('Failed to parse research output:', e);
              features = [];
            }

            for (const feature of features) {
              if (feature.priority >= 7) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Feature] ${feature.name}`,
                  body: `## ${feature.description}\n\n` +
                        `**Why AIOS needs this:** ${feature.relevance}\n\n` +
                        `**Complexity:** ${feature.complexity}\n\n` +
                        `**AI Generation Prompt:**\n\`\`\`\n${feature.ai_prompt}\n\`\`\`\n\n` +
                        `**References:**\n${feature.references}`,
                  labels: ['feature', 'ai-research']
                });
                console.log(`Created issue for: ${feature.name}`);
              }
            }

      - name: Upload Research Results
        uses: actions/upload-artifact@v4
        with:
          name: ai-research-results
          path: research_results.json
          retention-days: 30
