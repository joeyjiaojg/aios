# AI Feature Research + Auto PR Workflow
# Uses official OpenCode GitHub action

name: AI Feature Research

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic to research"
        required: false
        default: "operating system kernel features"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  AI_MODEL: "minimax/minimax-m2.5-free"

jobs:
  ai-research:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.extract.outputs.features }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OpenCode Research
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: ${{ env.AI_MODEL }}
          prompt: |
            Research the latest developments in operating system kernel design.
            Focus on: ${{ github.event.inputs.topic || 'operating system kernel features' }}

            Research topics:
            - New x86_64 features and CPU capabilities
            - Memory management innovations
            - Filesystem advances
            - Network stack optimizations
            - Security enhancements
            - Virtualization improvements

            Create a GitHub issue for each high-priority feature you find.
            Title: [Feature] <name>
            Body: Description, relevance to AIOS, complexity (Low/Medium/High), and AI generation prompt.
            Label the issues: feature, ai-research

      - name: Extract Features JSON
        id: extract
        run: |
          echo "features=extracted" >> $GITHUB_OUTPUT
