# AI Feature Research + Auto PR Workflow
# Uses OpenCode with free model (no API key required)

name: AI Feature Research

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic to research"
        required: false
        default: "operating system kernel features"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: npm i -g opencode-ai@latest

      - name: Research New Features
        id: research
        run: |
          TOPIC="${{ github.event.inputs.topic || 'operating system kernel features' }}"

          RESULT=$(opencode run -m opencode/minimax-m2.5-free \
            "Research operating system kernel design focusing on: $TOPIC.\n\nTopics: x86_64 features, memory management, filesystems, networking, security, virtualization.\n\nFor each high-priority feature found, output a JSON line with:\n{\"title\": \"Feature name\", \"description\": \"Brief description\", \"labels\": [\"feature\", \"kernel\"]}\n\nOutput only JSON lines, no other text." 2>&1) || echo "RESEARCH_FAILED"

          echo "research_output=$RESULT" >> $GITHUB_OUTPUT

      - name: Create Feature Issues
        if: steps.research.outputs.research_output != 'RESEARCH_FAILED'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = process.env.RESEARCH_OUTPUT || '';
            const lines = output.split('\n').filter(l => l.trim().startsWith('{'));

            for (const line of lines) {
              try {
                const feature = JSON.parse(line);
                if (feature.title && feature.description) {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `[Feature] ${feature.title}`,
                    body: `## Description\n${feature.description}\n\n## AI Research\nAuto-generated by AI Feature Research workflow.\n\n## Labels\n${(feature.labels || ['feature']).join(', ')}`,
                    labels: feature.labels || ['feature']
                  });
                }
              } catch (e) {
                console.log('Failed to parse:', line);
              }
            }