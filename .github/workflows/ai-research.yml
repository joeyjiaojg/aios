# AI Feature Research + Auto PR Workflow
# Uses OpenCode with free model (no API key required)

name: AI Feature Research

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Specific topic to research"
        required: false
        default: "operating system kernel features"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: npm i -g opencode-ai@latest

      - name: Research New Features
        run: |
          TOPIC="${{ github.event.inputs.topic || 'operating system kernel features' }}"

          opencode run -m opencode/minimax-m2.5-free -q \
            "Research the latest developments in operating system kernel design focusing on: $TOPIC.\n\nTopics: x86_64 features, memory management, filesystems, networking, security, virtualization.\n\nCreate GitHub issues for high-priority features with:\n- Title: [Feature] <name>\n- Body: Description, relevance to AIOS, complexity (Low/Medium/High), and an AI generation prompt to implement it.\n- Labels: feature, ai-research"

      - name: Create Feature Issues from Research
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
