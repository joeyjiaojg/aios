# AIOS Auto-Rebase Workflow
# Automatically rebases PRs when they have merge conflicts
# Runs BEFORE AI merge to ensure clean base

name: AI Auto-Rebase

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]
  workflow_run:
    workflows: ["AI Auto-Merge"]
    types: [completed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    outputs:
      has_conflicts: ${{ steps.check.outputs.has_conflicts }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      branch_name: ${{ steps.check.outputs.branch_name }}
      base_branch: ${{ steps.check.outputs.base_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        id: check
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
          BRANCH_NAME="${{ github.event.pull_request.head.ref || github.event.workflow_run.pull_requests[0].head.ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref || github.event.workflow_run.pull_requests[0].base.ref }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "No PR number found, skipping"
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "pr_number=0" >> $GITHUB_OUTPUT
            echo "branch_name=" >> $GITHUB_OUTPUT
            echo "base_branch=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Checking PR #$PR_NUMBER ($BRANCH_NAME) against $BASE_BRANCH"
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_BRANCH" >> $GITHUB_OUTPUT

          # Fetch branches
          git fetch origin $BASE_BRANCH --depth=1
          git fetch origin $BRANCH_NAME --depth=1

          # Check if branch has conflicts with base using three-way merge
          MERGE_RESULT=$(git merge-tree $(git rev-parse origin/$BASE_BRANCH) $(git rev-parse origin/$BRANCH_NAME) 2>&1 || true)

          if echo "$MERGE_RESULT" | grep -q "conflict"; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER has merge conflicts"
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER has no conflicts"
          fi

  rebase-branch:
    needs: check-conflicts
    if: needs.check-conflicts.outputs.has_conflicts == 'true' && needs.check-conflicts.outputs.pr_number != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase onto master
        env:
          PR_NUMBER: ${{ needs.check-conflicts.outputs.pr_number }}
          BRANCH_NAME: ${{ needs.check-conflicts.outputs.branch_name }}
          BASE_BRANCH: ${{ needs.check-conflicts.outputs.base_branch }}
        run: |
          echo "Rebasing $BRANCH_NAME onto origin/$BASE_BRANCH..."

          git fetch origin $BASE_BRANCH
          git fetch origin $BRANCH_NAME

          git checkout $BRANCH_NAME

          # Attempt rebase
          if git rebase origin/$BASE_BRANCH; then
            echo "Rebase succeeded, force pushing..."
            git push origin $BRANCH_NAME --force-with-lease
            echo "Rebase complete for PR #$PR_NUMBER"
          else
            echo "Rebase failed with conflicts, attempting auto-merge resolution..."
            git rebase --abort

            # Try merge instead
            git merge origin/$BASE_BRANCH --no-commit || true
            git diff --name-only --diff-filter=U >> /tmp/conflicting_files.txt

            if [ -s /tmp/conflicting_files.txt ]; then
              echo "Conflicting files:"
              cat /tmp/conflicting_files.txt
              git merge --abort
              echo "Manual resolution required for PR #$PR_NUMBER"
              exit 1
            fi

            git merge --abort
          fi

      - name: Post rebase comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🤖 Auto-Rebase Complete\n\nThis PR was automatically rebased onto the latest master branch to resolve merge conflicts.\n\nIf there are still conflicts, please resolve them manually.`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.check-conflicts.outputs.pr_number }}

  no-conflicts:
    needs: check-conflicts
    if: needs.check-conflicts.outputs.has_conflicts == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: No conflicts found
        run: |
          PR_NUM="${{ needs.check-conflicts.outputs.pr_number }}"
          echo "PR ${PR_NUM} has no conflicts with master"