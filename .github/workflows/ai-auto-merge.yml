# AI Auto-Review and Merge Workflow
# Uses OpenCode with free model (no API key required)

name: AI Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: npm i -g opencode-ai@latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt, clippy, rust-src
          targets: x86_64-unknown-none

      - name: Verify cargo installation
        run: cargo +nightly --version

      - name: Check code formatting
        run: make fmt

      - name: Run clippy
        run: make clippy

      - name: AI Code Review
        id: review
        run: |
          echo "=== AI Code Review Started ==="
          echo "PR: ${{ github.event.pull_request.number }}"
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.event.pull_request.head.ref }}"

          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

          REVIEW_RESULT=$(timeout 240 opencode run -m opencode/minimax-m2.5-free \
            "Review this AIOS Rust kernel code for:
- Memory safety (all unsafe blocks justified)
- x86_64 architecture correctness
- no_std compatibility (no Vec/String)
- No hardcoded secrets
- Proper error handling
- Commit messages with Model/Tool fields

Code diff:
$(cat /tmp/pr_diff.txt)

Reply with only: APPROVED or REJECTED (with one sentence reason)") 2>&1 || echo "TIMEOUT_OR_ERROR"

          echo "=== Review Result ==="
          echo "$REVIEW_RESULT"
          echo "=== End Review ==="

          if echo "$REVIEW_RESULT" | grep -qi "TIMEOUT_OR_ERROR"; then
            echo "review_output=OpenCode did not respond within 4 minutes" >> $GITHUB_OUTPUT
            echo "approved=false" >> $GITHUB_OUTPUT
            echo "REVIEW_STATUS=timeout_or_error" >> $GITHUB_OUTPUT
          elif echo "$REVIEW_RESULT" | grep -qi "APPROVED"; then
            echo "$REVIEW_RESULT" > /tmp/review_output.txt
            echo "review_output_file=/tmp/review_output.txt" >> $GITHUB_OUTPUT
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "REVIEW_STATUS=approved" >> $GITHUB_OUTPUT
          else
            echo "$REVIEW_RESULT" > /tmp/review_output.txt
            echo "review_output_file=/tmp/review_output.txt" >> $GITHUB_OUTPUT
            echo "approved=false" >> $GITHUB_OUTPUT
            echo "REVIEW_STATUS=rejected" >> $GITHUB_OUTPUT
          fi

      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewOutputFile = process.env.REVIEW_OUTPUT_FILE || '';
            const isApproved = (process.env.IS_APPROVED || '') === 'true';
            let reviewOutput = 'No review output available';
            
            console.log('DEBUG: REVIEW_OUTPUT_FILE =', reviewOutputFile);
            console.log('DEBUG: IS_APPROVED =', process.env.IS_APPROVED);
            console.log('DEBUG: isApproved =', isApproved);
            
            // Read the review output from the temporary file if it exists
            if (reviewOutputFile) {
              try {
                const fs = require('fs');
                reviewOutput = fs.readFileSync(reviewOutputFile, 'utf8');
                console.log('DEBUG: Successfully read', reviewOutput.length, 'chars');
              } catch (error) {
                console.log('DEBUG: Error reading file:', error.message);
                reviewOutput = 'Error reading review output: ' + error.message;
              }
            } else {
              console.log('DEBUG: reviewOutputFile is empty/falsy');
            }

            console.log('DEBUG: Posting comment with reviewOutput length =', reviewOutput.length);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Review Result\n\n**Model:** opencode/minimax-m2.5-free\n**Tool:** opencode\n**Status:** ${isApproved ? '✅ APPROVED' : '❌ REJECTED'}\n\n<details><summary>Details</summary>\n\n\`\`\`\n${reviewOutput}\n\`\`\`\n\n</details>`
            });
        env:
          REVIEW_OUTPUT_FILE: ${{ steps.review.outputs.review_output_file }}
          IS_APPROVED: ${{ steps.review.outputs.approved }}

      - name: Auto Merge if Approved
        if: steps.review.outputs.approved == 'true' && steps.review.outputs.approved != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const approvalStatus = process.env.APPROVAL_STATUS;
            if (approvalStatus !== 'true') {
              console.log('Not auto-merging: approval status is not true');
              return;
            }

            console.log('Auto-merging PR after approval...');
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            // Extract "Closes #N" references from PR body to close them after merge
            const body = pr.data.body || '';
            const closes = [...body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)]
              .map(m => parseInt(m[1]));

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
              commit_message: closes.length
                ? closes.map(n => `Closes #${n}`).join('\n')
                : undefined,
            });

            // Explicitly close referenced issues (API merge doesn't process PR body keywords)
            for (const issue of closes) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue,
                state: 'closed',
              });
              console.log(`Closed issue #${issue}`);
            }
        env:
          APPROVAL_STATUS: ${{ steps.review.outputs.approved }}

  cleanup-branch:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Check merged status
        run: |
          echo "PR Event Action: ${{ github.event.action }}"
          echo "PR Merged: ${{ github.event.pull_request.merged }}"
          echo "Branch: ${{ github.event.pull_request.head.ref }}"

      - name: Delete branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Deleting branch: $BRANCH_NAME"
          gh api -X DELETE repos/${{ github.repository_owner }}/${{ github.repository }}/git/refs/heads/$BRANCH_NAME 2>&1 || echo "Branch already deleted or error"
