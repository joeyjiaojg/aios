# AI Auto-Review and Merge Workflow
# Automatically reviews PRs using AI and merges if approved

name: AI Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AI Code Review
        uses: anthropic/claude-code-review@v1
        with:
          model: claude-opus-2026
          prompt: |
            Review this PR for AIOS, the AI-generated operating system.
            Check for:
            - Memory safety (no unsafe blocks without justification)
            - x86_64 architecture correctness
            - Consistency with existing code style
            - No hardcoded secrets or credentials
            - Proper error handling
            - Test coverage for new code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Auto Approve
        if: steps.review.outcome == 'approved'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ AI-approved: Code passed automated review.'
            });

      - name: Auto Merge
        if: steps.review.outcome == 'approved'
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: ""
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "automatic"
          MERGE_RETRIES: "5"
          MERGE_RETRY_SLEEP: "30000"
