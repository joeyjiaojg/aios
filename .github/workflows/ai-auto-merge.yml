# AI Auto-Review and Merge Workflow
# Uses official OpenCode GitHub action

name: AI Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  id-token: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: minimax/minimax-m2.5-free
          prompt: |
            Review this PR for AIOS, the AI-generated x86_64 operating system.
            Check for:
            1. Memory safety (no unsafe blocks without justification)
            2. x86_64 architecture correctness
            3. Consistency with Rust no_std patterns
            4. No hardcoded secrets or credentials
            5. Proper error handling
            6. Test coverage for new code
            7. Commit message follows AIOS convention (Model/Tool fields)

            If the code looks good, output "APPROVED".
            If there are issues, output "REJECTED" with a list of changes needed.
            Do NOT make any file edits. Only output the review result.

      - name: Auto Approve
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ AI-approved: Code passed automated review via OpenCode.'
            });

      - name: Auto Merge
        if: ${{ success() }}
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: ""
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "automatic"
          MERGE_RETRIES: "5"
          MERGE_RETRY_SLEEP: "30000"
