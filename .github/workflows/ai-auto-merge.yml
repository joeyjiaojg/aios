# AI Auto-Review and Merge Workflow
# Uses OpenCode with free model (no API key required)

name: AI Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode
        run: npm i -g opencode-ai@latest

      - name: AI Code Review
        id: review
        timeout-minutes: 5
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt

          REVIEW_RESULT=$(timeout 240 opencode run -m opencode/minimax-m2.5-free \
            "You are a code reviewer for AIOS, an AI-generated x86_64 OS written in Rust.\n\nReview the following PR diff:\n- Memory safety (unsafe blocks need justification)\n- x86_64 architecture correctness\n- Consistency with Rust no_std patterns\n- No hardcoded secrets\n- Proper error handling\n- Test coverage\n- Commit message follows AIOS convention (Model/Tool fields)\n\nDiff:\n$(cat /tmp/pr_diff.txt)\n\nOutput exactly 'APPROVED' or 'REJECTED' with brief reasoning.") 2>&1 || echo "TIMEOUT_OR_ERROR"

          if echo "$REVIEW_RESULT" | grep -qi "TIMEOUT_OR_ERROR"; then
            echo "review_output=OpenCode did not respond within 4 minutes" >> $GITHUB_OUTPUT
            echo "approved=false" >> $GITHUB_OUTPUT
          elif echo "$REVIEW_RESULT" | grep -qi "APPROVED"; then
            echo "review_output=$(echo "$REVIEW_RESULT" | tr '\n' ' ')" >> $GITHUB_OUTPUT
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "review_output=$(echo "$REVIEW_RESULT" | tr '\n' ' ')" >> $GITHUB_OUTPUT
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewOutput = process.env.REVIEW_OUTPUT || '';
            const isApproved = (process.env.IS_APPROVED || '') === 'true';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Review Result\n\n**Model:** opencode/minimax-m2.5-free\n**Tool:** opencode\n**Status:** ${isApproved ? '✅ APPROVED' : '❌ REJECTED'}\n\n<details><summary>Details</summary>\n\n\`\`\`\n${reviewOutput}\n\`\`\`\n\n</details>`
            });
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.review_output }}
          IS_APPROVED: ${{ steps.review.outputs.approved }}

      - name: Auto Merge if Approved
        if: steps.review.outputs.approved == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'merge'
            });

  cleanup-branch:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Delete branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Deleting branch: $BRANCH_NAME"
          git push origin --delete "$BRANCH_NAME" 2>&1 || echo "Branch already deleted or error"
