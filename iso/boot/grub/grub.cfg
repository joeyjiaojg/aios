# AIOS GRUB Configuration
#
# Model: opencode/minimax-m2.5-free
# Tool: opencode
# Prompt: GRUB/multiboot configuration for ISO build

set timeout=5
set default=0

menuentry "AIOS Kernel" {
    multiboot2 /boot/aios.kernel
    boot
}

menuentry "AIOS Kernel (debug)" {
    multiboot2 /boot/aios.kernel console=ttyS0
    boot
}