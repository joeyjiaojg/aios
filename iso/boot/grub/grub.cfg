# AIOS GRUB Configuration
#
# Model: claude-sonnet-4-6
# Tool: claude-code
# Prompt: GRUB serial terminal config for QEMU -nographic with arrow key navigation.

set timeout=10
set default=0

# Serial terminal at 115200 baud for QEMU -nographic
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input --append serial
terminal_output --append serial

menuentry "AIOS Kernel" {
    multiboot2 /boot/aios.kernel
    boot
}

menuentry "AIOS Kernel (debug)" {
    multiboot2 /boot/aios.kernel console=ttyS0
    boot
}
